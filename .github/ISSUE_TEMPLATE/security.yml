name: Security Issue
description: Report a security vulnerability
title: '[Security] '
labels:
  - 'kind:security'
body:
  - type: markdown
    attributes:
      value: |
        ## DO NOT file public security issues.

        **Please do not report security vulnerabilities through public GitHub issues.**

        Instead, email **security@argus.dev** with the details of the vulnerability.

        See [SECURITY.md](../SECURITY.md) for our full responsible disclosure policy and instructions on how to report a vulnerability safely.

        Thank you for helping keep Argus and its users safe.
