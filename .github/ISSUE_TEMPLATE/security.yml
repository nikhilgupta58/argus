name: Security Vulnerability
description: Report a security vulnerability (this creates a PRIVATE issue)
labels: ["kind:security"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not file public security issues.** Please follow our responsible disclosure process at [SECURITY.md](../SECURITY.md).
  - type: textarea
    id: description
    attributes:
      label: Vulnerability description
    validations:
      required: true
